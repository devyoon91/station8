<?xml version="1.0" encoding="UTF-8"?>
<!--
  Station8 favicon — mark과 동일하지만 작은 사이즈에서 가시성 확보를 위해
  트랙 stroke 굵기와 station 외곽 비중을 살짝 키운 버전.
  modern UA가 type="image/svg+xml" 를 지원 → 16/32/180px 모두 같은 파일로 커버.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Station8">
  <title>Station8</title>
  <path d="M 22 50 C 22 30 38 30 50 50 C 62 70 78 70 78 50 C 78 30 62 30 50 50 C 38 70 22 70 22 50 Z"
        stroke="#f4f4f6" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="22" cy="50" r="9" fill="#0d0d0d" stroke="#e6197f" stroke-width="5"/>
  <circle cx="50" cy="50" r="9" fill="#0d0d0d" stroke="#e6197f" stroke-width="5"/>
  <circle cx="78" cy="50" r="9" fill="#0d0d0d" stroke="#e6197f" stroke-width="5"/>
</svg>
