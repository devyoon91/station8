# demo 프로파일 — 부팅 직후 운영자가 즉시 만져볼 수 있도록 샘플 DAG/스케줄 자동 시드
# 활성화: SPRING_PROFILES_ACTIVE=docker,demo (docker compose 환경) 또는 ./gradlew bootRun --args='--spring.profiles.active=demo'

# 폴링 간격을 짧게 (5초) — 데모에서 즉시 반응 보이도록
workflow.polling.interval-ms=5000
workflow.scheduler.interval-ms=5000

# 데모 환경에서는 디버그 로그 약간 더 풍부히
logging.level.com.station8=DEBUG

# 데모 HTTP 라인이 자기 자신(/api/demo/echo/...)에 호출 — loopback이라 default blocklist에 걸린다.
# demo 프로파일만 localhost를 allowlist에 둠. 운영 프로파일에는 적용 안 됨.
station8.http.allowlist=localhost,127.0.0.1

# 데모 파일 라인이 쓸 inbox/outbox — OS tempdir 아래 demo 디렉토리.
# DemoSeedRunner가 부팅 시 디렉토리 + 샘플 파일을 자동 시드.
station8.file.local.allowed-roots=${java.io.tmpdir}/station8-demo/inbox,${java.io.tmpdir}/station8-demo/outbox
