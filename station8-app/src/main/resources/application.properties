# Default profile (H2 임베디드 + MariaDB 호환 모드)
# 이전에 Application.java의 @Bean DataSource가 hardcode하던 설정 (#45 fix로 자동 설정에 위임)
# docker 프로파일에서는 application-docker.properties가 이를 override
spring.datasource.url=jdbc:h2:mem:appdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Spring Batch
# - 부팅 시 Job 자동 실행 차단 (라인 역에서만 SpringBatchActivityAdapter를 통해 호출)
spring.batch.job.enabled=false
# - 임베디드 DB(H2/HSQL/Derby)에서 BATCH_* 메타 테이블 자동 생성
spring.batch.jdbc.initialize-schema=embedded

# Mustache view
spring.mustache.suffix=.mustache
spring.mustache.charset=UTF-8

# HTTP 응답 한글 인코딩
# Spring Boot 3.x는 server.servlet.encoding.force 기본값이 false라 Tomcat이 플랫폼 기본 charset
# (Windows-Korean = MS949, 또는 ISO-8859-1)으로 응답을 직렬화 → 한글이 ``?``로 깨짐.
# force=true로 OrderedCharacterEncodingFilter가 응답에 UTF-8을 강제 설정하도록 한다.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Spring Boot SQL 초기화 — DataSource bean 직후, @Scheduled 태스크 시작 전에 적용된다.
# (이전에는 MigrationInitializer(CommandLineRunner)에서 schema 적용했는데, @Scheduled가
#  ContextRefreshed 직후 발화하므로 ~30초 동안 "Table doesn't exist" 에러가 스팸 발생했음.)
# h2/mariadb 프로파일별로 spring.sql.init.platform이 schema-${platform}.sql 자동 선택.
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.schema-locations=classpath:sql/schema-${spring.sql.init.platform}.sql
spring.sql.init.continue-on-error=true

# 외부 plugins/*.jar 동적 로딩 (M5)
# - 활성화 시 부팅 후 ApplicationReadyEvent 단계에서 디렉토리 스캔 → URLClassLoader로 @Activity 등록
# - 동일 이름이 코어/타 플러그인에 이미 있으면 충돌로 무시
engine.plugins.enabled=false
engine.plugins.dir=plugins

# DLQ 웹훅 알림 (#67) — 비어있으면 콘솔 로그로 대체
# Slack incoming webhook 등의 URL을 환경변수 ENGINE_DLQ_WEBHOOK_URL로 override 가능.
engine.dlq.webhook-url=

# 초기 ADMIN 시드 (#121 / #125) — 비-docker 환경 default
# - username: admin (변경 시 STATION8_INITIAL_ADMIN_USERNAME 환경변수)
# - password: 비어있음 → 첫 부팅(DB 빈) 시 랜덤 비밀번호 자동 생성 + 콘솔에 1회 출력
#   명시 비밀번호는 STATION8_INITIAL_ADMIN_PASSWORD 환경변수로 주입 권장 (커밋 금지)
station8.security.initial-admin.username=admin
station8.security.initial-admin.password=

# Multipart 업로드 한도 (#102 — 어드민 플러그인 jar 업로드)
# AdminPluginController의 자체 50MB 검증과 매칭 (Spring 거절 + 컨트롤러 거절 양쪽 방어선)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB

# ----------------------------------------------------------------------
# 멀티 DataSource (#108) — 액티비티가 이름으로 외부 DB에 R/W하는 경우 선언
# ----------------------------------------------------------------------
# 사용 예시 (주석 해제 후 값 채우기):
#
# station8.datasources.source-oracle.url=jdbc:oracle:thin:@oracle-prod:1521:ORCL
# station8.datasources.source-oracle.username=etl_reader
# station8.datasources.source-oracle.password=${DB_SOURCE_ORACLE_PASSWORD}
# station8.datasources.source-oracle.driver-class-name=oracle.jdbc.OracleDriver
# station8.datasources.source-oracle.dialect=oracle
# station8.datasources.source-oracle.hikari.maximum-pool-size=5
#
# station8.datasources.target-mart.url=jdbc:mariadb://mart:3306/analytics
# station8.datasources.target-mart.username=etl_writer
# station8.datasources.target-mart.password=${DB_TARGET_MART_PASSWORD}
#
# 액티비티에서 사용:
#   @Activity("MIGRATE")
#   public String migrate(String input, DataSourceRegistry ds) {
#       JdbcTemplate src = ds.jdbc("source-oracle");
#       JdbcTemplate dst = ds.jdbc("target-mart");
#       ...
#   }
#
# primary 동작:
# - 위 spring.datasource.*가 정의되어 있으면 자동으로 primary로 등록 (D2(c) fallback)
# - 또는 station8.datasources.primary.url 명시 시 그것이 primary가 됨 (Spring autoconfig preempt)
