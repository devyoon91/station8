# Default profile (H2 임베디드 + MariaDB 호환 모드)
# 이전에 Application.java의 @Bean DataSource가 hardcode하던 설정 (#45 fix로 자동 설정에 위임)
# docker 프로파일에서는 application-docker.properties가 이를 override
spring.datasource.url=jdbc:h2:mem:appdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Spring Batch
# - 부팅 시 Job 자동 실행 차단 (워크플로우 노드에서만 SpringBatchActivityAdapter를 통해 호출)
spring.batch.job.enabled=false
# - 임베디드 DB(H2/HSQL/Derby)에서 BATCH_* 메타 테이블 자동 생성
spring.batch.jdbc.initialize-schema=embedded

# Mustache view
spring.mustache.suffix=.mustache

# 외부 plugins/*.jar 동적 로딩 (M5)
# - 활성화 시 부팅 후 ApplicationReadyEvent 단계에서 디렉토리 스캔 → URLClassLoader로 @Activity 등록
# - 동일 이름이 코어/타 플러그인에 이미 있으면 충돌로 무시
engine.plugins.enabled=false
engine.plugins.dir=plugins
