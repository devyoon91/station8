# docker 프로파일은 ``docker compose``로 함께 기동되는 환경 기준.
# - 컨테이너 내부에서 mariadb 서비스명으로 접근 (compose 네트워크 DNS)
# - docker-compose.yml의 환경변수가 이 값을 override 가능
spring.datasource.url=jdbc:mariadb://mariadb:3306/workflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=wfuser
spring.datasource.password=wfpw
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.sql.init.mode=never

# JPA is not used; we rely on JdbcTemplate
spring.jpa.show-sql=false
