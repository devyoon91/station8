<?xml version="1.0" encoding="UTF-8"?>
<!--
  Station8 mark — figure-8 (숫자 8) 트랙 + 위/아래 station 2개
  - 트랙은 currentColor (다크/라이트 컨텍스트 자동 적응)
  - 역 링은 8호선 핑크 #e6197f, 안쪽은 #0d0d0d 표면
  - viewBox 100×100, 단일 path로 매끄럽게 figure-8을 트레이스
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Station8">
  <title>Station8</title>
  <path d="M 50 14 C 30 14 30 42 50 50 C 70 58 70 86 50 86 C 30 86 30 58 50 50 C 70 42 70 14 50 14 Z"
        stroke="currentColor" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="14" r="7" fill="#0d0d0d" stroke="#e6197f" stroke-width="4"/>
  <circle cx="50" cy="86" r="7" fill="#0d0d0d" stroke="#e6197f" stroke-width="4"/>
</svg>
