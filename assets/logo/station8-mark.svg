<?xml version="1.0" encoding="UTF-8"?>
<!--
  Station8 mark — ∞ (8 옆으로) + 3개 역(Station)
  - 트랙은 currentColor (다크/라이트 컨텍스트 자동 적응)
  - 역 링은 8호선 핑크(#e6197f), 안쪽은 #0d0d0d 표면
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Station8">
  <title>Station8</title>
  <path d="M 22 50 C 22 30 38 30 50 50 C 62 70 78 70 78 50 C 78 30 62 30 50 50 C 38 70 22 70 22 50 Z"
        stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="22" cy="50" r="7" fill="#0d0d0d" stroke="#e6197f" stroke-width="4"/>
  <circle cx="50" cy="50" r="7" fill="#0d0d0d" stroke="#e6197f" stroke-width="4"/>
  <circle cx="78" cy="50" r="7" fill="#0d0d0d" stroke="#e6197f" stroke-width="4"/>
</svg>
