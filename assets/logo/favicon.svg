<?xml version="1.0" encoding="UTF-8"?>
<!--
  Station8 favicon — ∞(figure-8) 루프를 시그니처 핑크 #e6197f로 고정.
  브라우저 탭은 currentColor 미적용 + 라이트/다크 양쪽 탭 chrome에서 보여야 함.
  핑크 #e6197f는 라이트(#f4f4f4)/다크(#1f2024) 양쪽에서 충분한 대비.
  Station 안쪽은 흰색에 가까운 #f4f4f6으로 비워서 "도장 찍힌" 느낌.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Station8">
  <title>Station8</title>
  <path d="M 50 14 C 30 14 30 42 50 50 C 70 58 70 86 50 86 C 30 86 30 58 50 50 C 70 42 70 14 50 14 Z"
        stroke="#e6197f" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="14" r="9" fill="#f4f4f6" stroke="#e6197f" stroke-width="5"/>
  <circle cx="50" cy="86" r="9" fill="#f4f4f6" stroke="#e6197f" stroke-width="5"/>
</svg>
