<?xml version="1.0" encoding="UTF-8"?>
<!--
  Station8 가로 lockup — light 변형.
  GitHub 라이트 테마 / 흰 배경에서 사용. 트랙·워드마크 = #1f2328 (GitHub 본문 색).
  역 링만 8호선 핑크 고정.
  README의 <picture> srcset (light fallback)으로 사용.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" fill="none" role="img" aria-label="Station8">
  <title>Station8</title>
  <g transform="translate(8,5)">
    <path d="M 50 14 C 30 14 30 42 50 50 C 70 58 70 86 50 86 C 30 86 30 58 50 50 C 70 42 70 14 50 14 Z"
          stroke="#1f2328" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="14" r="7" fill="#ffffff" stroke="#e6197f" stroke-width="4"/>
    <circle cx="50" cy="86" r="7" fill="#ffffff" stroke="#e6197f" stroke-width="4"/>
  </g>
  <text x="120" y="66" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="48" fill="#1f2328" letter-spacing="-1.5">Station8</text>
</svg>
