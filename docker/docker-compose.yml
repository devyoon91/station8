version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: swe-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: workflow
      MARIADB_USER: wfuser
      MARIADB_PASSWORD: wfpw
    ports:
      - "3307:3306"
    volumes:
      - ./init/mariadb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

