services:
  mariadb:
    image: mariadb:11.4
    container_name: swe-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: workflow
      MARIADB_USER: wfuser
      MARIADB_PASSWORD: wfpw
    ports:
      - "3307:3306"
    # 스키마는 station8-app이 부팅 시 schema-mariadb.sql로 적용 (single source of truth)
    # docker init scripts는 drift 위험이 있어 제거
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: swe-app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # docker: 컨테이너 네트워크용 datasource 설정 (mariadb 호스트)
      # demo: 부팅 직후 샘플 DAG + 스케줄 자동 시드 (DemoSeedRunner)
      SPRING_PROFILES_ACTIVE: docker,demo
      # docker 프로파일이 spring.datasource를 참조하므로 명시적 override는 불필요하나,
      # 컨테이너 네트워크 호스트로 mariadb 사용 (compose 서비스명 = DNS)
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/workflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: wfuser
      SPRING_DATASOURCE_PASSWORD: wfpw
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    restart: unless-stopped

