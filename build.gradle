plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.2' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

allprojects {
    group = 'com.station8'
    version = '0.0.1-SNAPSHOT'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    java {
        // Spring Boot 3.4.2의 ASM 9.7이 Java 25 클래스 파일(major 69)을 인식하지 못해 #28 발생.
        // 단기 해결: Java 21(LTS, Spring Boot 3.4.x 공식 지원)로 다운그레이드.
        // 장기: Spring Boot 4.0 + Java 25 업그레이드는 별도 마일스톤으로 진행.
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:3.4.2"
        }
    }

    dependencies {
        implementation 'org.slf4j:slf4j-api'
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    tasks.withType(Test) {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
    }
}


// --- Docker Compose helper tasks ---
tasks.register('composeUp', Exec) {
    group = 'docker'
    description = 'Start test databases via docker-compose (DB only, daemon)'
    workingDir = file('docker')
    commandLine 'docker', 'compose', 'up', '-d', 'mariadb'
}

tasks.register('composeUpApp', Exec) {
    group = 'docker'
    description = 'Build app image and start full stack (MariaDB + station8-app) — single command'
    workingDir = file('docker')
    commandLine 'docker', 'compose', 'up', '--build', '-d'
}

tasks.register('composeLogsApp', Exec) {
    group = 'docker'
    description = 'Tail station8-app container logs'
    workingDir = file('docker')
    commandLine 'docker', 'compose', 'logs', '-f', 'app'
}

tasks.register('composeDown', Exec) {
    group = 'docker'
    description = 'Stop all compose services and remove containers + volumes'
    workingDir = file('docker')
    commandLine 'docker', 'compose', 'down', '-v'
}
